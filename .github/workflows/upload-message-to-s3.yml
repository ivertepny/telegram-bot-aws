name: Upload Telegram message to S3

on:
  push:
    branches:
      - main
    paths:
      - 'content/message.txt'
      - '.github/workflows/upload-message-to-s3.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::016683085594:role/github-actions-s3-upload-role
          aws-region: eu-central-1

      - name: Upload message.txt to S3
        run: |
          aws s3 cp content/message.txt s3://igor-telegram-bot-text/message.txt