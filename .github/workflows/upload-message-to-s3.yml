name: Upload Telegram message

on:
  push:
    branches:
      - main
    paths:
      - 'content/message.txt'

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::016683085594:role/github-actions-s3-upload-role
          aws-region: eu-central-1

      - run: aws s3 cp content/message.txt s3://igor-telegram-bot-text/message.txt